# Which provider/model each agent uses. Edit me to mix providers.
#
# Supported providers: gemini, grok, openrouter, openai, deepseek, groq
# Each provider needs its matching API key in .env (see .env.example).
#
# Default config is Groq-only so one free GROQ_API_KEY is enough to get
# running. The two reviewer seats use the higher-throughput 8B model; the
# tech lead uses the stronger 70B model for the final synthesis.
#
# Temporary override without editing this file:
#   python cli.py --sample --provider groq --model llama-3.1-8b-instant

[security_auditor]
provider = "groq"
model = "llama-3.1-8b-instant"

[optimization_expert]
provider = "groq"
model = "llama-3.1-8b-instant"

[tech_lead]
provider = "groq"
model = "llama-3.3-70b-versatile"
